services:
  torproxy:
    build: .
    ports:
      - "10800:10800"
      - "10801:10801"
      - "10802:10802"
    volumes:
      - torproxy-cache:/root/.torproxy-chain
      - mitm-certs:/root/.mitmproxy:ro
    environment:
      TORPROXY_HEADLESS: "1"
      TORPROXY_STATUS_PORT: "10801"
      # TORPROXY_SKIP_MITM_CHECK: "1"   # uncomment to disable MITM check at startup
      # TORPROXY_COUNTRY: "FR"
      # TORPROXY_WATCHDOG_INTERVAL: "30"
      # TORPROXY_FAIL_THRESHOLD: "3"
    restart: unless-stopped

  mitm:
    build:
      context: ./mitm_proxy
      dockerfile: Dockerfile
    command: >
      mitmdump
      --mode upstream:http://torproxy:10802
      --listen-port 8080
      --listen-host 0.0.0.0
      --set ssl_insecure=true
      --scripts /mitm_proxy/addon.py
    ports:
      - "8080:8080"
    volumes:
      - ./mitm_proxy:/mitm_proxy:ro
      - ./heuristics.yml:/heuristics.yml:ro
      - mitm-certs:/root/.mitmproxy
    depends_on:
      - torproxy
    restart: unless-stopped

volumes:
  torproxy-cache:
  mitm-certs:
